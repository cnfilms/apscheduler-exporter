name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest

    permissions:
      contents: write   # for GitHub release
      id-token: write   # for PyPI trusted publisher (OIDC)

    environment:
      name: pypi
      url: https://pypi.org/project/apscheduler-exporter

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv and setup the python version
        uses: astral-sh/setup-uv@v5

      - name: Install the project
        run: uv sync --all-groups

      - name: Bump version
        run: uv version ${GITHUB_REF_NAME#v}

      - name: Build wheel
        run: uv build --no-create-gitignore

      - name: Publish package
        run: uv publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
